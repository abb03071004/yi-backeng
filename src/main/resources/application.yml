spring:
  redis:
    host: ${sky.redis.host}
    port: ${sky.redis.port}
    password: ${sky.redis.password}
    lettuce:
      pool:
        max-active: ${sky.redis.lettuce.pool.max-active}
        max-idle: ${sky.redis.lettuce.pool.max-idle}
        min-idle: ${sky.redis.lettuce.pool.min-idle}
        time-between-eviction-runs: ${sky.redis.lettuce.pool.time-between-eviction-runs}
    database: ${sky.redis.database}
  datasource:
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/yi?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: root
      password: 123456
  profiles:
    active: dev
  application:
    name: yi-backend
server:
  port: 8443
  ssl:
    key-store: "keystore.jks"
    key-store-password: ${password.ssl}
    key-alias: tomcat
mybatis-plus:
  global-config:
    db-config:
      column-format: "`%s`"
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info
config:
  jwt:
    secretKey: ${yi.jwt.secretKey}
    ttl: ${yi.jwt.ttl}
    tokenName: ${yi.jwt.tokenName}
  wechat:
    appid: ${yi.wechat.appid}
    secret: ${yi.wechat.secret}